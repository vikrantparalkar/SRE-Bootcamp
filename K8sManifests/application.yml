apiVersion: v1
kind: ConfigMap
metadata:
  name: restapi-config
  namespace: student-api

data:
  DATABASE_URL: "postgresql://postgres:password@postgresdb-service:5432/students"
  PORT: "5000"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: restapi-deployment
  namespace: student-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: restapi

  template:
    metadata:
      labels:
        app: restapi

    spec:

      nodeSelector:
        type: application

      initContainers:
      - name: db-migration

        image: vikrantparalkar21/student-api:1.0.1

        command:
         - sh
         - -c
         - |
            apt update && apt install postgresql-client -y &&
            PGPASSWORD=$POSTGRES_PASSWORD psql \
            -h postgresdb-service \
            -U $POSTGRES_USER \
            -d $POSTGRES_DB \
            -f /app/migrate.sql

        envFrom:
        - configMapRef:
            name: restapi-config
        - configMapRef:
            name: postgresdb-config
        - secretRef:
            name: db-secret

      containers:
      - name: restapi

        image: vikrantparalkar21/student-api:1.0.1

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: restapi-config
        - configMapRef:
            name: postgresdb-config
        - secretRef:
            name: db-secret

---

apiVersion: v1
kind: Service
metadata:
  name: restapi-service
  namespace: student-api

spec:
  type: NodePort

  selector:
    app: restapi

  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30000