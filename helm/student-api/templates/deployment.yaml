apiVersion: apps/v1
kind: Deployment
metadata:
  name: restapi-deployment
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: restapi

  template:
    metadata:
      labels:
        app: restapi

    spec:

      nodeSelector:
        type: application

      initContainers:
      - name: db-migration

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        command:
         - sh
         - -c
         - |
            apt update && apt install postgresql-client -y &&
            PGPASSWORD=$POSTGRES_PASSWORD psql \
            -h postgresdb-service \
            -U $POSTGRES_USER \
            -d $POSTGRES_DB \
            -f migrations.sql

        envFrom:
        - configMapRef:
            name: restapi-config

        - configMapRef:
            name: postgresdb-config

        - secretRef:
            name: db-secret

      containers:
      - name: restapi

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: restapi-config

        - configMapRef:
            name: postgresdb-config

        - secretRef:
            name: db-secret